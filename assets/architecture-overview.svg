  <text x="60" y="475" class="lbl-sm">web3-audit, llm-attack, llm-ato</text>

  <rect x="375" y="220" width="250" height="200" class="box box-cmd" rx="8"/>
  <text x="500" y="245" text-anchor="middle" class="lbl">commands/  (14 slash cmds)</text>
  <text x="395" y="275" class="lbl-sm">/surface  /recon  /intel  /hunt</text>
  <text x="395" y="295" class="lbl-sm">/chain  /triage  /validate  /report</text>
  <text x="395" y="315" class="lbl-sm">/token-scan  /autopilot  /pickup</text>
  <text x="395" y="335" class="lbl-sm">/memory-gc  /remember  /web3-audit</text>

  <rect x="710" y="220" width="250" height="200" class="box box-script" rx="8"/>
  <text x="835" y="245" text-anchor="middle" class="lbl">scripts/</text>
  <text x="730" y="275" class="lbl-sm">cbh.py — CLI harness</text>
  <text x="730" y="295" class="lbl-sm">refresh-cve-index.py — NVD fetcher</text>
  <text x="730" y="315" class="lbl-sm">secret_scan.py — 50+ regex patterns</text>
  <text x="730" y="335" class="lbl-sm">install.sh — symlink installer</text>
  <text x="730" y="355" class="lbl-sm">hunt.sh — engagement scaffold</text>

  <rect x="375" y="440" width="250" height="120" class="box" rx="8"/>
  <text x="500" y="465" text-anchor="middle" class="lbl">engagement/  (per target)</text>
  <text x="395" y="490" class="lbl-sm">scope.md  recon-notes.md  chains.md</text>
  <text x="395" y="510" class="lbl-sm">findings/  evidence/  baseline/</text>

  <path d="M500 140 L500 220" class="arr"/>
  <path d="M165 540 L165 580" class="arr" stroke-dasharray="4 3"/>
  <path d="M500 420 L500 440" class="arr"/>
  <path d="M835 420 L835 580" class="arr" stroke-dasharray="4 3"/>
  <path d="M500 560 L500 580" class="arr"/>

  <text x="500" y="600" text-anchor="middle" class="lbl">disk artifacts: engagement files (md, HAR, screenshots)</text>
</svg>
