<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Claude Bug Hunter banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a2244"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff7a59"/>
      <stop offset="0.5" stop-color="#ffb44a"/>
      <stop offset="1" stop-color="#5ac8fa"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2848" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <g transform="translate(60,80)">
    <text x="0" y="0" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="64" font-weight="700" fill="#e8eefc">
      Claude Bug Hunter
    </text>
    <rect x="0" y="20" width="780" height="6" fill="url(#accent)"/>
    <text x="0" y="80" font-family="ui-sans-serif, Inter, system-ui" font-size="22" fill="#9aa6cf">
      Battle-tested skill bundle for external attack-surface assessments.
    </text>
    <text x="0" y="120" font-family="ui-sans-serif, Inter, system-ui" font-size="18" fill="#7e8ab0">
      51 skills · 14 commands · 7-question validation gate · 681-report corpus
    </text>
  </g>
  <g transform="translate(960,80)" fill="#5ac8fa" stroke="#5ac8fa" stroke-width="2" fill-opacity="0.1">
    <circle cx="60" cy="60" r="58"/>
    <circle cx="60" cy="60" r="38"/>
    <circle cx="60" cy="60" r="18"/>
    <path d="M60 2 L60 118 M2 60 L118 60" stroke-opacity="0.4"/>
    <circle cx="60" cy="60" r="4" fill="#ff7a59" stroke="#ff7a59"/>
  </g>
</svg>
